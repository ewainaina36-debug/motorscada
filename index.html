<!DOCTYPE html>
<html>
<head>
  <title>Motor Control</title>
  <style>
    body {
      text-align: center;
      background: #0f172a;
      color: white;
      font-family: Arial;
    }
    button {
      padding: 15px;
      margin: 10px;
      font-size: 18px;
      border-radius: 10px;
    }
    input {
      padding: 10px;
      margin: 10px;
    }
  </style>
</head>

<body>

<h1>3-Phase Motor Control</h1>

<div id="login">
  <input type="email" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<div id="panel" style="display:none;">
  <button onclick="startMotor()">START</button>
  <button onclick="stopMotor()">STOP</button><br>

  <input type="number" id="time" placeholder="Seconds">
  <button onclick="setTimer()">TIMER</button>

  <h2 id="temp">Temp: --</h2>
  <h2 id="status">Status: --</h2>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDL35HgLN3vpIRQjcYSgBzX9uAaj8TWF9A",
  authDomain: "motor-scada-5320c.firebaseapp.com",
  databaseURL: "https://motor-scada-5320c-default-rtdb.firebaseio.com",
  projectId: "motor-scada-5320c",
  storageBucket: "motor-scada-5320c.firebasestorage.app",
  messagingSenderId: "656759651703",
  appId: "1:656759651703:web:9d4e9328237691cf3eb572",
  measurementId: "G-ZB397X7TMC"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

// LOGIN
function login(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
  .then(()=>{
    document.getElementById("login").style.display="none";
    document.getElementById("panel").style.display="block";
  })
  .catch(err => alert(err.message));
}

// BUTTONS
function startMotor(){
  db.ref("motor/control").set("START");
}

function stopMotor(){
  db.ref("motor/control").set("STOP");
}

function setTimer(){
  let t = document.getElementById("time").value;
  db.ref("motor/control").set("TIMER " + t);
}

// LIVE DATA
db.ref("motor").on("value", snap => {
  let data = snap.val();
  if(!data) return;

  document.getElementById("temp").innerText = "Temp: " + data.temp;
  document.getElementById("status").innerText = "Status: " + data.state;
});
</script>

</body>
</html>
